<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>Squirrel</title>
        <link href="css/bootstrap.min.css" rel="stylesheet" />
        <link href="css/local.css" rel="stylesheet" />
        <script src="js/d3.v7.min.js"></script>
    </head>

    <body>
        <div id="app">
            <div v-if="!connection.connected" class="curtain">DISCONNECTED</div>
            <div class="connection-monitor">
                <div v-if="connection.connected">
                    Connected: {{ connection.connected.duration }} | Requests:
                    {{ connection.serverInfo ? connection.serverInfo.n_requests
                    : ''}}
                </div>
                <div v-else>Disconnected</div>
            </div>

            <div id="mapcontainer" class="map-container">
                <svg class="map"></svg>
            </div>
        </div>
    </body>

    <script type="module">
        import {
            createApp,
            ref,
            onMounted,
        } from "./js/vue.esm-browser.js";

        import { squirrelMap } from "./js/squirrel-map.js";
        import { squirrelConnection } from "./js/squirrel-connection.js";

        createApp({
            setup() {
                let connection = ref(squirrelConnection());

                onMounted(() => {
                    squirrelMap();
                });

                return { connection };
            },
        }).mount("#app");
    </script>
</html>
